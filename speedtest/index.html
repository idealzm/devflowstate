<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speedtest - DevFlowState</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="speedtest.css">
</head>
<body>
  <div id="header-container"></div>

  <main class="speedtest-page">
    <h1>Speedtest</h1>
    
    <div class="connection-info" id="connection-info">
      <div class="info-item">
        <span class="info-label">IP Адрес</span>
        <span class="info-value" id="ip-address">--</span>
      </div>
      <div class="info-item">
        <span class="info-label">Провайдер</span>
        <span class="info-value" id="isp">--</span>
      </div>
      <div class="info-item">
        <span class="info-label">Локация</span>
        <span class="info-value" id="location">--</span>
      </div>
    </div>

    <div class="speedtest-container">
      <div class="gauge-wrapper">
        <div class="gauge">
          <svg viewBox="0 0 200 120" class="gauge-svg">
            <path class="gauge-bg" d="M 20 100 A 80 80 0 0 1 180 100" />
            <path class="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" />
          </svg>
          <div class="gauge-value">
            <span class="speed-value" id="speed-value">0.00</span>
            <span class="speed-unit">Mbps</span>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📶</div>
          <div class="stat-label">Ping</div>
          <div class="stat-value" id="ping-value">--</div>
          <div class="stat-unit">ms</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⬇️</div>
          <div class="stat-label">Download</div>
          <div class="stat-value" id="download-value">--</div>
          <div class="stat-unit">Mbps</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⬆️</div>
          <div class="stat-label">Upload</div>
          <div class="stat-value" id="upload-value">--</div>
          <div class="stat-unit">Mbps</div>
        </div>
      </div>

      <div class="start-btn-wrapper">
        <button class="start-btn" id="start-btn">Начать тест</button>
      </div>

      <div class="status-text" id="status-text">Нажмите "Начать тест" для проверки скорости</div>

      <div class="progress-container" id="progress-container" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="phase-indicator">
          <span class="phase" id="phase-ping">Ping</span>
          <span class="phase" id="phase-download">Download</span>
          <span class="phase" id="phase-upload">Upload</span>
        </div>
      </div>
    </div>
  </main>

  <script src="speedtest.js"></script>
</body>
</html>
