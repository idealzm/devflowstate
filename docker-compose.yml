version: '3.8'

services:
  devflowstate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devflowstate
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./tmp:/app/tmp
    networks:
      - devflowstate-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  devflowstate-network:
    driver: bridge
